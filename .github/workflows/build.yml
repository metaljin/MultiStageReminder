name: 最终成功编译
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: 赋权
      run: chmod +x gradlew
    # 编译 Debug 包（自动签名，一定生成！）
    - name: 编译
      run: ./gradlew assembleDebug
    # 上传 Debug 安装包
    - name: 上传
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
