name: 纯编译APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    # 直接用系统Gradle，不碰任何脚本
    - name: 编译安装包
      run: gradle assembleDebug
      
    # 通配符查找所有APK
    - name: 上传APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: '**/*.apk'
