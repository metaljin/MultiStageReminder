name: Build & Release APK
on:
  push:
    # 只有推送到 main 分支时触发编译
    branches: [ main ]
    # 或者当你推送以 v 开头的标签（如 v1.0.1）时触发发布
    tags: 
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须：授予 Actions 写入 Release 的权限

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 解码签名文件到根目录
      - name: Decode Keystore
        run: echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > release.jks

      # 编译正式版 APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEY_STORE_PATH: release.jks
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 步骤 A：作为 Artifact 上传（方便在 Actions 页面直接下载）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiStageReminder-Signed-APK
          path: app/build/outputs/apk/release/*.apk

      # 步骤 B：自动创建 GitHub Release（仅在推送 Tag 时触发）
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          body: "🎉 多阶段提醒 App 正式版发布！包含代码混淆优化与正式签名。"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
