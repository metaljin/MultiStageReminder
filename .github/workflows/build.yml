name: 编译APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: gradle assembleRelease -Dgradle.version=8.0
      
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: app
        path: "**/build/outputs/apk/release/*.apk"
