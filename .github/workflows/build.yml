name: 最终成功编译
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: 赋权
      run: chmod +x gradlew
    - name: 编译
      run: ./gradlew assembleRelease
    - name: 上传
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
